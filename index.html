<div id="app-root"></div> 
<style>
  :root{
    --bg: #1B2430;
    --bg-soft: #232E3D;
    --panel: #F3EFE3;
    --panel-soft: #EAE4D3;
    --ink: #24211C;
    --muted: #7A7362;
    --brass: #C98A3E;
    --brass-dark: #A66E2B;
    --teal: #2F6F6B;
    --rust: #B4533A;
    --line: rgba(36,33,28,0.14);
    --line-dark: rgba(243,239,227,0.10);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }
  #app-root{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(201,138,62,0.10), transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(47,111,107,0.14), transparent 45%);
    min-height: 100%;
    padding: 28px 20px 40px;
    box-sizing: border-box;
    color: var(--panel);
  }
  .wrap{ max-width: 980px; margin: 0 auto; }
  .top{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 22px; flex-wrap: wrap; gap: 8px;
  }
  .top h1{
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-weight: 600; font-size: 30px; letter-spacing: 0.2px; margin:0;
    color: var(--panel);
  }
  .top .date{
    font-family: "SF Mono", "IBM Plex Mono", Consolas, monospace;
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(243,239,227,0.55);
  }
  .grid{
    display:grid; grid-template-columns: 1.2fr 1fr; gap: 18px;
  }
  @media (max-width: 720px){ .grid{ grid-template-columns: 1fr; } }

  .panel{
    background: var(--panel); color: var(--ink); border-radius: 10px;
    padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    position: relative; overflow: hidden;
  }
  .panel::before{
    content:""; position:absolute; top:0; left:0; right:0; height:4px;
    background: var(--brass);
  }
  .panel h2{
    font-family: Georgia, serif; font-size: 15px; font-weight:700;
    text-transform: uppercase; letter-spacing: 0.09em; margin: 0 0 14px 0;
    color: var(--ink); display:flex; align-items:center; gap:8px;
  }
  .side{ display:flex; flex-direction:column; gap:18px; }

  /* --- Notatnik nad tablicą --- */
  .notepad{
    background:#fffef7;
    background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 27px, rgba(120,150,190,0.38) 28px);
    background-position: 0 8px;
    border-radius: 6px;
    padding: 16px 18px 14px 26px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.28), 0 1px 0 rgba(255,255,255,0.5) inset;
    position: relative;
    transform: rotate(-0.4deg);
  }
  .notepad::before{
    content:''; position:absolute; top:0; bottom:0; left:38px; width:1px;
    background: rgba(200,90,90,0.32);
  }
  .notepad-counter{
    position:absolute; top:8px; right:14px;
    font-family: "SF Mono","IBM Plex Mono",monospace; font-size:11px; color:#9a9280;
  }
  .notepad .task-input-row{
    display:flex; gap:12px; align-items:baseline; margin:0; position:relative; z-index:1;
  }
  .notepad input#task-input{
    flex:1; background:transparent; border:none; outline:none;
    font-family: "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive;
    font-size: 16px; color:#2b2820; padding: 5px 2px; line-height: 27px;
  }
  .notepad input#task-input::placeholder{ color:#a39c88; font-style:italic; }
  .notepad input#task-category-input{
    width: 110px; background:transparent; border:none; outline:none;
    border-bottom: 1px dashed rgba(0,0,0,0.22);
    font-family: "Segoe Print", "Bradley Hand", "Comic Sans MS", cursive;
    font-size: 14px; color:#5c5648; padding: 5px 2px; line-height: 27px;
  }
  .notepad button#task-add-btn{
    background: #5C3A1E; color: #fff; border:none; border-radius:6px;
    padding: 0 16px; height: 34px; font-weight: 600; font-size: 13px; cursor:pointer;
    transition: background .15s; align-self:center;
  }
  .notepad button#task-add-btn:hover{ background: #472C16; }

  .color-picker-wrap{ position:relative; flex-shrink:0; }
  .color-picker-btn{
    width:28px; height:28px; border-radius:3px; border:none; cursor:pointer;
    background: var(--selected, #FFEE93);
    box-shadow: 1px 2px 4px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(0,0,0,0.08);
    position:relative; align-self:center;
  }
  .color-picker-btn::before{
    content:''; position:absolute; top:-4px; left:50%; margin-left:-3px;
    width:6px; height:6px; border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #ff8f8f, #a11d1d 75%);
    box-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .color-popup{
    position:absolute; top:36px; right:0; z-index:10;
    background:#fff; border-radius:9px; padding:8px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    display:flex; gap:7px;
  }
  .color-popup[hidden]{ display:none; }
  .color-swatch{
    width:22px; height:22px; border-radius:50%; border:2px solid #fff;
    box-shadow: 0 0 0 1.5px rgba(0,0,0,0.15); cursor:pointer; padding:0;
    transition: transform .1s;
  }
  .color-swatch:hover{ transform: scale(1.15); }
  .color-swatch.selected{ box-shadow: 0 0 0 2px #3B2413; }

  /* --- Tasks: korkowa tablica --- */
  #tasks-panel{
    background-color: #C68A4E;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.10) 1px, transparent 1.5px),
      radial-gradient(circle, rgba(0,0,0,0.18) 1px, transparent 1.5px),
      radial-gradient(circle at 50% 30%, rgba(0,0,0,0.22), transparent 70%);
    background-size: 5px 5px, 8px 8px, 100% 100%;
    background-position: 0 0, 2px 3px, 0 0;
    border: 9px solid #7A4A26;
    box-shadow: 0 10px 26px rgba(0,0,0,0.4), inset 0 0 40px rgba(0,0,0,0.28);
  }
  #tasks-panel::before{ display:none; }
  #tasks-panel h2{ color:#3B2413; text-shadow: 0 1px 0 rgba(255,255,255,0.18); }
  #tasks-panel .task-count{ color:#6b4423; }

  .task-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; }
  .task-empty{ color:#fff8ec; font-size: 13.5px; padding: 24px 4px; font-style: italic; text-align:center; }

  .category-group{ margin: 2px 4px 20px; }
  .category-group summary{
    cursor:pointer; list-style:none; user-select:none;
    display:inline-flex; align-items:center; gap:7px;
    background: linear-gradient(100deg, rgba(255,248,220,0.95), rgba(255,248,220,0.78));
    color:#3B2413; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:0.06em;
    padding: 6px 14px; border-radius:2px; transform: rotate(-1.1deg);
    box-shadow: 1px 3px 7px rgba(0,0,0,0.32);
  }
  .category-group summary::-webkit-details-marker{ display:none; }
  .category-arrow{ display:inline-block; transition: transform .15s; color:#8a5a2b; font-size:10px; }
  .category-group[open] .category-arrow{ transform: rotate(90deg); }
  .category-count{
    margin-left:4px; font-family:"SF Mono","IBM Plex Mono",monospace; font-size:10px;
    color:#6b4423; font-weight:400;
  }
  .category-swatch{
    width:14px; height:14px; border-radius:50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
    display:inline-block;
  }
  .category-body{ padding: 20px 2px 4px; }
  .category-body .task-list{
    display:flex; flex-wrap:wrap; gap: 20px 16px; list-style:none; margin:0; padding:0 2px 4px;
  }

  .task-item{
    width:148px; min-height:96px; background: var(--paper, #FFEE93);
    padding: 18px 12px 10px; border-radius: 2px; position:relative;
    box-shadow: 2px 6px 10px rgba(0,0,0,0.38), inset 0 0 0 1px rgba(0,0,0,0.05);
    transform: rotate(var(--rot, 0deg));
    transition: transform .15s ease;
    display:flex; flex-direction:column; gap:10px; flex-shrink:0;
  }
  .task-item:hover{ transform: rotate(0deg) scale(1.04); z-index:2; }
  .task-item::before{
    content:''; position:absolute; top:-8px; left:50%; margin-left:-7px;
    width:14px; height:14px; border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #ff8f8f, #a11d1d 75%);
    box-shadow: 0 3px 4px rgba(0,0,0,0.5), inset 0 -1px 2px rgba(0,0,0,0.3);
  }
  .task-text{
    font-size: 13px; line-height:1.35; color:#3a3220; font-family: Georgia, serif;
    word-break: break-word; flex:1;
  }
  .task-item.done{ opacity:0.62; }
  .task-item.done .task-text{ text-decoration: line-through; color:#5a5442; }
  .task-item-footer{ display:flex; align-items:center; justify-content:space-between; }
  .task-check{
    width:18px; height:18px; border-radius:50%; border:2px solid rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:11px; color:transparent; background:rgba(255,255,255,0.45); flex-shrink:0;
    transition: all .15s;
  }
  .task-check.done{ background:#2F6F6B; border-color:#2F6F6B; color:#fff; }
  .task-del{
    background:none; border:none; color: rgba(0,0,0,0.35); cursor:pointer;
    font-size: 14px; padding: 2px 4px; line-height:1; transition: color .15s;
  }
  .task-del:hover{ color:#a11d1d; }
  .task-stamp{
    position:absolute; font-family: Georgia, serif; font-weight:700; font-size:10px;
    letter-spacing:0.08em; color: #2F6F6B; border: 1.5px solid #2F6F6B;
    border-radius: 4px; padding: 2px 5px; transform: rotate(-10deg) scale(0);
    opacity:0; pointer-events:none; top: 8px; right: 8px;
  }
  @keyframes stampIn{
    0%{ transform: rotate(-10deg) scale(0.4); opacity:0; }
    55%{ transform: rotate(-10deg) scale(1.15); opacity:1; }
    100%{ transform: rotate(-10deg) scale(1); opacity:1; }
  }


  /* --- Weather: okno z dwoma szybami --- */
  #weather-panel{
    background:none; box-shadow:none; padding:0; border-radius:0; overflow:visible;
  }
  #weather-panel::before{ display:none; }
  .window-frame{
    display:flex; background:#f5f5f2; border-radius:8px; padding:12px; gap:12px;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.06), 0 4px 10px rgba(0,0,0,0.15);
    align-items:stretch;
  }
  .window-pane{
    flex: 1 1 50%; box-sizing: border-box;
    background: linear-gradient(160deg, #eef6fb 0%, #d7e8f2 100%);
    border-radius: 4px; padding: 14px 12px;
    box-shadow: inset 0 0 20px rgba(120,160,190,0.22), inset 0 0 0 1px rgba(255,255,255,0.6);
  }
  .window-mullion{
    width:15px; flex-shrink:0; background:#f5f5f2; border-radius:3px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .weather-today{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; gap:10px; text-align:center;
  }
  .weather-today-icon{ font-size:42px; line-height:1; }
  .weather-today-temps{ display:flex; gap:14px; }
  .wt-label{
    display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.05em;
    color: var(--muted);
  }
  .wt-value{
    display:block; font-family:"SF Mono","IBM Plex Mono",monospace; font-size:20px;
    font-weight:600; color: var(--ink); margin-top:2px;
  }
  .weather-today-place{ font-size:12px; color: var(--muted); margin-top:2px; }

  /* --- Weather 7-day --- */
  .weather-days{ display:flex; flex-direction:column; gap:2px; }
  .weather-day-row{
    display:flex; align-items:center; gap:10px; padding: 8px 2px;
    border-bottom: 1px solid var(--line); font-size: 13px;
  }
  .weather-day-row:last-child{ border-bottom:none; }
  .weather-day-name{ width:34px; font-weight:600; color: var(--ink); flex-shrink:0; }
  .weather-day-icon{ font-size:18px; width:22px; text-align:center; flex-shrink:0; }
  .weather-day-precip{
    font-size:11px; color: var(--teal); width:38px; text-align:right; flex-shrink:0;
    font-family:"SF Mono","IBM Plex Mono",monospace;
  }
  .weather-day-temps{
    margin-left:auto; font-family:"SF Mono","IBM Plex Mono",monospace; font-size:13px;
    display:flex; gap:6px; flex-shrink:0;
  }
  .weather-day-max{ color: var(--ink); font-weight:600; }
  .weather-day-min{ color: var(--muted); }
  .weather-place{ font-size: 12px; color: var(--muted); margin-top: 10px; }

  /* --- Currency: monitor kantorowy --- */
  #fx-panel{
    background:none; box-shadow:none; padding:0; border-radius:0; overflow:visible;
  }
  #fx-panel::before{ display:none; }
  .exchange-board{
    background: linear-gradient(180deg, #0d1b12, #04140c);
    border: 6px solid #1c1c1c; border-radius: 8px;
    padding: 16px 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.45), inset 0 0 24px rgba(0,0,0,0.6);
  }
  .exchange-board .fx-row{
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .exchange-board .fx-pair{
    color: #6FEFA0; font-family:"SF Mono","IBM Plex Mono",Consolas,monospace;
    font-weight:700; letter-spacing:0.05em; text-shadow: 0 0 6px rgba(111,239,160,0.5);
  }
  .exchange-board .fx-rate{
    color: #FFD84A; font-size:16px; font-weight:700;
    text-shadow: 0 0 6px rgba(255,216,74,0.45);
  }
  .exchange-board .fx-arrow-up{ color:#4CFF7A; text-shadow: 0 0 5px rgba(76,255,122,0.6); }
  .exchange-board .fx-arrow-down{ color:#FF5C5C; text-shadow: 0 0 5px rgba(255,92,92,0.6); }
  .exchange-board .fx-arrow-flat{ color:#5c6b5f; }
  .exchange-board .fx-updated{ color: rgba(150,220,180,0.4); }

  .fx-row{
    display:flex; align-items:center; justify-content:space-between;
    padding: 9px 2px; border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .fx-row:last-child{ border-bottom:none; }
  .fx-pair{ font-weight:600; color: var(--ink); }
  .fx-value{ display:flex; align-items:center; gap:6px; }
  .fx-rate{
    font-family: "SF Mono","IBM Plex Mono",Consolas,monospace; font-size: 14px;
    color: var(--ink);
  }
  .fx-arrow-up{ color: var(--teal); }
  .fx-arrow-down{ color: var(--rust); }
  .fx-arrow-flat{ color: var(--muted); }
  .fx-updated{ font-size: 11px; color: var(--muted); margin-top: 10px; }

  .status-note{
    font-size: 12px; color: var(--muted); font-style: italic; margin-top: 8px;
  }
  .spinner{
    width:16px; height:16px; border:2px solid var(--line); border-top-color: var(--brass);
    border-radius:50%; animation: spin 0.8s linear infinite; display:inline-block;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
</style>

<script>
(function(){
  const SUPABASE_PROXY_URL = "https://ezwzjwzgthfomnkyumyo.supabase.co/functions/v1/dashboard-proxy";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_q2nm3yFL_AMwfqLdjT0ZTQ__VnlWsZN";
  const DASHBOARD_SECRET = "ySUOPMQ1ZuIDtO67uYg8O5zc4x2ORJUh";

  function apiHeaders(extra){
    return {
      'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
      'apikey': SUPABASE_PUBLISHABLE_KEY,
      'x-dashboard-secret': DASHBOARD_SECRET,
      ...extra
    };
  }

  const root = document.getElementById('app-root');

  const dateStr = new Date().toLocaleDateString('pl-PL', { weekday:'long', day:'numeric', month:'long' });

  root.innerHTML = `
    <div class="wrap">
      <div class="top">
        <h1>Biurko Michała</h1>
        <div class="date">${dateStr}</div>
      </div>
      <div class="grid">
        <div class="tasks-column" style="display:flex; flex-direction:column; gap:16px;">
          <div class="notepad">
            <span class="notepad-counter" id="task-count"></span>
            <div class="task-input-row">
              <input id="task-input" type="text" placeholder="" />
              <div class="color-picker-wrap">
                <button id="color-picker-btn" class="color-picker-btn" type="button" title="Wybierz kolor karteczki"></button>
                <div class="color-popup" id="color-popup" hidden></div>
              </div>
              <button id="task-add-btn">Dodaj</button>
            </div>
          </div>
          <div class="panel" id="tasks-panel">
            <ul class="task-list" id="task-list"><span class="spinner"></span></ul>
          </div>
        </div>
        <div class="side">
          <div class="panel" id="weather-panel">
            <div class="window-frame">
              <div class="window-pane" id="weather-today"><span class="spinner"></span></div>
              <div class="window-mullion"></div>
              <div class="window-pane" id="weather-week"><span class="spinner"></span></div>
            </div>
          </div>
          <div class="panel" id="fx-panel">
            <div class="exchange-board" id="fx-body"><span class="spinner"></span></div>
          </div>
        </div>
      </div>
    </div>
  `;

  /* ---------------- TASKS ---------------- */
  const TASKS_URL = `${SUPABASE_PROXY_URL}?type=tasks`;
  let tasks = [];

  async function loadTasks(){
    const list = document.getElementById('task-list');
    try{
      const res = await fetch(TASKS_URL, { headers: apiHeaders() });
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      tasks = (data.tasks || []).map(t => ({ id: t.id, text: t.text, done: t.done, category: t.category, createdAt: t.created_at }));
    }catch(e){
      list.innerHTML = '<div class="task-empty">Nie udało się połączyć z bazą zadań. Sprawdź połączenie i odśwież stronę.</div>';
      return;
    }
    renderTasks();
  }

  const PAPER_COLORS = ['#FFEE93','#FFD1DC','#C9F2C7','#BFE3FF','#FFD9A0','#E3D2F5'];
  const ROTATIONS = [-4,-2,-1,1,2,3,-3,4];

  function hashStr(str){
    let h = 0;
    for(let i=0;i<str.length;i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
    return h;
  }
  function rotationFor(id){ return ROTATIONS[hashStr(id + 'r') % ROTATIONS.length]; }

  let selectedColor = PAPER_COLORS[0];
  const colorBtn = document.getElementById('color-picker-btn');
  const colorPopup = document.getElementById('color-popup');

  function refreshColorSwatches(){
    colorPopup.innerHTML = PAPER_COLORS.map(c => `
      <button type="button" class="color-swatch ${c === selectedColor ? 'selected' : ''}" data-color="${c}" style="background:${c};"></button>
    `).join('');
    colorPopup.querySelectorAll('.color-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        selectedColor = sw.dataset.color;
        colorBtn.style.setProperty('--selected', selectedColor);
        refreshColorSwatches();
        colorPopup.hidden = true;
      });
    });
  }
  refreshColorSwatches();
  colorBtn.style.setProperty('--selected', selectedColor);

  colorBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    colorPopup.hidden = !colorPopup.hidden;
  });
  document.addEventListener('click', (e) => {
    if(!colorPopup.hidden && !colorPopup.contains(e.target) && e.target !== colorBtn){
      colorPopup.hidden = true;
    }
  });

  function renderTasks(){
    const list = document.getElementById('task-list');
    const count = document.getElementById('task-count');
    const active = tasks.filter(t => !t.done).length;
    count.textContent = tasks.length ? `${active}/${tasks.length}` : '';

    // odśwież podpowiedzi kategorii
    if(!tasks.length){
      list.innerHTML = '<div class="task-empty">Brak zadań — dodaj pierwsze powyżej.</div>';
      return;
    }

    // grupowanie po kolorze karteczki, zachowując kolejność pierwszego pojawienia się
    const groups = new Map();
    tasks.forEach(t => {
      const color = t.category || PAPER_COLORS[0];
      if(!groups.has(color)) groups.set(color, []);
      groups.get(color).push(t);
    });

    list.innerHTML = [...groups.entries()].map(([color, catTasks]) => {
      const sorted = [...catTasks].sort((a,b) => (a.done === b.done) ? 0 : (a.done ? 1 : -1));
      const activeInCat = catTasks.filter(t => !t.done).length;
      return `
        <details class="category-group" open>
          <summary>
            <span class="category-arrow">▶</span>
            <span class="category-swatch" style="background:${color};"></span>
            <span class="category-count">${activeInCat}/${catTasks.length}</span>
          </summary>
          <div class="category-body">
            <ul class="task-list" style="margin:0; padding:0;">
              ${sorted.map(t => `
                <li class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}" style="--paper:${t.category || PAPER_COLORS[0]}; --rot:${rotationFor(t.id)}deg;">
                  <div class="task-text">${escapeHtml(t.text)}</div>
                  <div class="task-item-footer">
                    <div class="task-check ${t.done ? 'done' : ''}" data-action="toggle" data-id="${t.id}">${t.done ? '✓' : ''}</div>
                    <button class="task-del" data-action="delete" data-id="${t.id}" title="Usuń">✕</button>
                  </div>
                  <div class="task-stamp" data-stamp="${t.id}">GOTOWE</div>
                </li>
              `).join('')}
            </ul>
          </div>
        </details>
      `;
    }).join('');

    list.querySelectorAll('[data-action="toggle"]').forEach(el => {
      el.addEventListener('click', () => toggleTask(el.dataset.id));
    });
    list.querySelectorAll('[data-action="delete"]').forEach(el => {
      el.addEventListener('click', () => deleteTask(el.dataset.id));
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function addTask(){
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if(!text) return;
    const category = selectedColor;
    input.value = '';
    input.disabled = true;
    try{
      const res = await fetch(TASKS_URL, {
        method: 'POST',
        headers: apiHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ action: 'add', text, category })
      });
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      tasks.push({ id: data.task.id, text: data.task.text, done: data.task.done, category: data.task.category, createdAt: data.task.created_at });
      renderTasks();
    }catch(e){
      alert('Nie udało się dodać zadania — sprawdź połączenie i spróbuj ponownie.');
      input.value = text;
    }
    input.disabled = false;
    input.focus();
  }

  async function toggleTask(id){
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    const newDone = !t.done;
    t.done = newDone;
    if(newDone){
      const stamp = document.querySelector(`[data-stamp="${id}"]`);
      if(stamp){
        stamp.style.animation = 'none';
        void stamp.offsetWidth;
        stamp.style.animation = 'stampIn 0.5s ease-out forwards';
      }
      setTimeout(renderTasks, 480);
    } else {
      renderTasks();
    }
    try{
      const res = await fetch(TASKS_URL, {
        method: 'POST',
        headers: apiHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ action: 'toggle', id, done: newDone })
      });
      if(!res.ok) throw new Error('bad response');
    }catch(e){
      t.done = !newDone; // cofnij zmianę jeśli zapis się nie udał
      renderTasks();
      alert('Nie udało się zapisać zmiany — sprawdź połączenie.');
    }
  }

  async function deleteTask(id){
    const backup = tasks;
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
    try{
      const res = await fetch(TASKS_URL, {
        method: 'POST',
        headers: apiHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ action: 'delete', id })
      });
      if(!res.ok) throw new Error('bad response');
    }catch(e){
      tasks = backup; // przywróć jeśli usuwanie się nie udało
      renderTasks();
      alert('Nie udało się usunąć zadania — sprawdź połączenie.');
    }
  }

  document.getElementById('task-add-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => {
    if(e.key === 'Enter') addTask();
  });

  loadTasks();

  /* ---------------- WEATHER (Turnhout, BE) ---------------- */
  const WEATHER_CODES = {
    0:['☀️','Bezchmurnie'],1:['🌤️','Prawie bezchmurnie'],2:['⛅','Częściowe zachmurzenie'],
    3:['☁️','Pochmurno'],45:['🌫️','Mgła'],48:['🌫️','Mgła z szadzią'],
    51:['🌦️','Lekka mżawka'],53:['🌦️','Mżawka'],55:['🌧️','Silna mżawka'],
    61:['🌧️','Lekki deszcz'],63:['🌧️','Deszcz'],65:['🌧️','Silny deszcz'],
    71:['🌨️','Lekki śnieg'],73:['🌨️','Śnieg'],75:['❄️','Silny śnieg'],
    80:['🌦️','Przelotne opady'],81:['🌧️','Przelotny deszcz'],82:['⛈️','Ulewa'],
    95:['⛈️','Burza'],96:['⛈️','Burza z gradem'],99:['⛈️','Silna burza']
  };

  async function loadWeather(){
    const todayEl = document.getElementById('weather-today');
    const weekEl = document.getElementById('weather-week');
    const directUrl = 'https://api.open-meteo.com/v1/forecast?latitude=51.3222&longitude=4.9447&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FBrussels&forecast_days=7';
    const fetchUrl = SUPABASE_PROXY_URL ? `${SUPABASE_PROXY_URL}?type=weather` : directUrl;
    const fetchOpts = SUPABASE_PROXY_URL ? { headers: {
      'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
      'apikey': SUPABASE_PUBLISHABLE_KEY
    }} : {};
    try{
      const res = await fetch(fetchUrl, fetchOpts);
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const daily = data.daily;
      const dayNames = ['Nd','Pon','Wt','Śr','Czw','Pt','Sob'];

      // Lewa szyba: dziś
      const [todayIcon] = WEATHER_CODES[daily.weathercode[0]] || ['🌡️'];
      const todayMax = Math.round(daily.temperature_2m_max[0]);
      const todayMin = Math.round(daily.temperature_2m_min[0]);
      todayEl.innerHTML = `
        <div class="weather-today">
          <div class="weather-today-icon">${todayIcon}</div>
          <div class="weather-today-temps">
            <div><span class="wt-label">Dzień</span><span class="wt-value">${todayMax}°</span></div>
            <div><span class="wt-label">Noc</span><span class="wt-value">${todayMin}°</span></div>
          </div>
          <div class="weather-today-place">Turnhout</div>
        </div>
      `;

      // Prawa szyba: 7 dni
      const rows = daily.time.map((dateStr, i) => {
        const d = new Date(dateStr);
        const label = i === 0 ? 'Dziś' : dayNames[d.getDay()];
        const [icon] = WEATHER_CODES[daily.weathercode[i]] || ['🌡️'];
        const max = Math.round(daily.temperature_2m_max[i]);
        const min = Math.round(daily.temperature_2m_min[i]);
        const precip = Math.round(daily.precipitation_probability_max[i]);
        return `
          <div class="weather-day-row">
            <div class="weather-day-name">${label}</div>
            <div class="weather-day-icon">${icon}</div>
            <div class="weather-day-precip">💧${precip}%</div>
            <div class="weather-day-temps">
              <span class="weather-day-max">${max}°</span>
              <span class="weather-day-min">${min}°</span>
            </div>
          </div>
        `;
      }).join('');
      weekEl.innerHTML = `<div class="weather-days">${rows}</div>`;
    }catch(e){
      const msg = SUPABASE_PROXY_URL ? 'Nie udało się połączyć z Twoim proxy Supabase.' : 'Nie udało się pobrać danych na żywo (sandbox blokuje zapytania).';
      todayEl.innerHTML = `<div class="status-note">${msg}</div>`;
      weekEl.innerHTML = '';
    }
  }
  loadWeather();

  /* ---------------- CURRENCY ---------------- */
  const FX_PREV_KEY = 'fx_prev_rates';

  function arrowFor(curr, prev){
    if(prev == null) return '<span class="fx-arrow-flat">–</span>';
    if(curr > prev) return '<span class="fx-arrow-up">▲</span>';
    if(curr < prev) return '<span class="fx-arrow-down">▼</span>';
    return '<span class="fx-arrow-flat">–</span>';
  }

  async function loadFx(){
    const body = document.getElementById('fx-body');
    const directUrl = 'https://api.frankfurter.app/latest?from=EUR&to=USD,PLN';
    const fetchUrl = SUPABASE_PROXY_URL ? `${SUPABASE_PROXY_URL}?type=fx` : directUrl;
    const fetchOpts = SUPABASE_PROXY_URL ? { headers: {
      'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
      'apikey': SUPABASE_PUBLISHABLE_KEY
    }} : {};
    try{
      const res = await fetch(fetchUrl, fetchOpts);
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const eurUsd = data.rates.USD;
      const eurPln = data.rates.PLN;
      const usdPln = eurPln / eurUsd;
      const btcUsd = data.bitcoin ? data.bitcoin.usd : null;
      const btcPln = data.bitcoin ? data.bitcoin.pln : null;

      let prev = {};
      try{
        const raw = localStorage.getItem(FX_PREV_KEY);
        prev = raw ? JSON.parse(raw) : {};
      }catch(e){ prev = {}; }

      body.innerHTML = `
        <div class="fx-row">
          <div class="fx-pair">EUR → PLN</div>
          <div class="fx-value">${arrowFor(eurPln, prev.eurPln)}<span class="fx-rate">${eurPln.toFixed(4)}</span></div>
        </div>
        <div class="fx-row">
          <div class="fx-pair">USD → PLN</div>
          <div class="fx-value">${arrowFor(usdPln, prev.usdPln)}<span class="fx-rate">${usdPln.toFixed(4)}</span></div>
        </div>
        ${btcUsd != null ? `
        <div class="fx-row">
          <div class="fx-pair">₿ BTC</div>
          <div class="fx-value">${arrowFor(btcUsd, prev.btcUsd)}<span class="fx-rate">$${Math.round(btcUsd).toLocaleString('en-US')}</span></div>
        </div>
        ` : ''}
        <div class="fx-updated">Zaktualizowano: ${data.date} · dane: Frankfurter API, CoinGecko</div>
      `;

      try{
        localStorage.setItem(FX_PREV_KEY, JSON.stringify({ eurPln, eurUsd, usdPln, btcPln, btcUsd }));
      }catch(e){}
    }catch(e){
      body.innerHTML = `
        <div class="status-note">
          ${SUPABASE_PROXY_URL ? 'Nie udało się połączyć z Twoim proxy Supabase. Sprawdź, czy funkcja jest wdrożona i URL jest poprawny.' : 'Nie udało się pobrać kursów na żywo (sandbox blokuje zapytania). Ustaw SUPABASE_PROXY_URL na górze skryptu.'}
        </div>
      `;
    }
  }
  loadFx();
})();
</script>
