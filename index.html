<div id="app-root"></div>
<style>
  :root{
    --bg: #1B2430;
    --bg-soft: #232E3D;
    --panel: #F3EFE3;
    --panel-soft: #EAE4D3;
    --ink: #24211C;
    --muted: #7A7362;
    --brass: #C98A3E;
    --brass-dark: #A66E2B;
    --teal: #2F6F6B;
    --rust: #B4533A;
    --line: rgba(36,33,28,0.14);
    --line-dark: rgba(243,239,227,0.10);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }
  #app-root{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(201,138,62,0.10), transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(47,111,107,0.14), transparent 45%);
    min-height: 100%;
    padding: 28px 20px 40px;
    box-sizing: border-box;
    color: var(--panel);
  }
  .wrap{ max-width: 980px; margin: 0 auto; }
  .top{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 22px; flex-wrap: wrap; gap: 8px;
  }
  .top h1{
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-weight: 600; font-size: 30px; letter-spacing: 0.2px; margin:0;
    color: var(--panel);
  }
  .top .date{
    font-family: "SF Mono", "IBM Plex Mono", Consolas, monospace;
    font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(243,239,227,0.55);
  }
  .grid{
    display:grid; grid-template-columns: 1.5fr 1fr; gap: 18px;
  }
  @media (max-width: 720px){ .grid{ grid-template-columns: 1fr; } }

  .panel{
    background: var(--panel); color: var(--ink); border-radius: 10px;
    padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    position: relative; overflow: hidden;
  }
  .panel::before{
    content:""; position:absolute; top:0; left:0; right:0; height:4px;
    background: var(--brass);
  }
  .panel h2{
    font-family: Georgia, serif; font-size: 15px; font-weight:700;
    text-transform: uppercase; letter-spacing: 0.09em; margin: 0 0 14px 0;
    color: var(--ink); display:flex; align-items:center; gap:8px;
  }
  .side{ display:flex; flex-direction:column; gap:18px; }

  /* --- Tasks --- */
  .task-input-row{ display:flex; gap:8px; margin-bottom: 16px; }
  .task-input-row input{
    flex:1; border: 1.5px solid var(--line); background: #fff; color: var(--ink);
    border-radius: 7px; padding: 10px 12px; font-size: 14px; outline: none;
    font-family: inherit;
  }
  .task-input-row input:focus{ border-color: var(--brass); }
  .task-input-row button{
    background: var(--brass); color: #fff; border:none; border-radius:7px;
    padding: 0 18px; font-weight: 600; font-size: 14px; cursor:pointer;
    transition: background .15s;
  }
  .task-input-row button:hover{ background: var(--brass-dark); }

  .task-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px; }
  .task-item{
    display:flex; align-items:center; gap:10px; padding: 10px 8px;
    border-radius: 7px; border: 1px solid transparent;
    transition: background .15s;
  }
  .task-item:hover{ background: var(--panel-soft); }
  .task-check{
    width:20px; height:20px; border-radius:50%; border:2px solid var(--teal);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    flex-shrink:0; font-size:12px; color:transparent; transition: all .15s;
  }
  .task-check.done{ background: var(--teal); color:#fff; }
  .task-text{ flex:1; font-size: 14.5px; word-break: break-word; }
  .task-item.done .task-text{ text-decoration: line-through; color: var(--muted); }
  .task-del{
    background:none; border:none; color: var(--muted); cursor:pointer;
    font-size: 16px; padding: 4px 8px; border-radius: 5px; transition: all .15s;
    flex-shrink:0;
  }
  .task-del:hover{ color: var(--rust); background: rgba(180,83,58,0.1); }
  .task-empty{ color: var(--muted); font-size: 13.5px; padding: 10px 4px; font-style: italic; }
  .task-stamp{
    position:absolute; font-family: Georgia, serif; font-weight:700; font-size:11px;
    letter-spacing:0.1em; color: var(--teal); border: 1.5px solid var(--teal);
    border-radius: 4px; padding: 2px 6px; transform: rotate(-8deg) scale(0);
    opacity:0; pointer-events:none; right: 10px;
  }
  @keyframes stampIn{
    0%{ transform: rotate(-8deg) scale(0.4); opacity:0; }
    55%{ transform: rotate(-8deg) scale(1.15); opacity:1; }
    100%{ transform: rotate(-8deg) scale(1); opacity:1; }
  }
  .task-count{
    font-family: "SF Mono", "IBM Plex Mono", Consolas, monospace; font-size: 11px;
    color: var(--muted); margin-left:auto; font-weight:400; text-transform:none;
    letter-spacing:0;
  }

  .category-group{ margin-bottom: 4px; }
  .category-group summary{
    cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px;
    padding: 8px 6px; font-weight:600; font-size: 13px; color: var(--ink);
    border-bottom: 1px solid var(--line); user-select:none;
  }
  .category-group summary::-webkit-details-marker{ display:none; }
  .category-arrow{ display:inline-block; transition: transform .15s; color: var(--brass); font-size:11px; }
  .category-group[open] .category-arrow{ transform: rotate(90deg); }
  .category-count{
    margin-left:auto; font-family:"SF Mono","IBM Plex Mono",monospace; font-size:11px;
    color: var(--muted); font-weight:400;
  }
  .category-body{ padding: 4px 0 8px 0; }
  .task-category-select{
    border: 1.5px solid var(--line); background: #fff; color: var(--ink);
    border-radius: 7px; padding: 0 10px; font-size: 13px; font-family: inherit;
    max-width: 130px;
  }

  /* --- Weather 7-day --- */
  .weather-days{ display:flex; flex-direction:column; gap:2px; }
  .weather-day-row{
    display:flex; align-items:center; gap:10px; padding: 8px 2px;
    border-bottom: 1px solid var(--line); font-size: 13px;
  }
  .weather-day-row:last-child{ border-bottom:none; }
  .weather-day-name{ width:34px; font-weight:600; color: var(--ink); flex-shrink:0; }
  .weather-day-icon{ font-size:18px; width:22px; text-align:center; flex-shrink:0; }
  .weather-day-precip{
    font-size:11px; color: var(--teal); width:38px; text-align:right; flex-shrink:0;
    font-family:"SF Mono","IBM Plex Mono",monospace;
  }
  .weather-day-temps{
    margin-left:auto; font-family:"SF Mono","IBM Plex Mono",monospace; font-size:13px;
    display:flex; gap:6px; flex-shrink:0;
  }
  .weather-day-max{ color: var(--ink); font-weight:600; }
  .weather-day-min{ color: var(--muted); }
  .weather-place{ font-size: 12px; color: var(--muted); margin-top: 10px; }

  /* --- Weather --- */
  .weather-main{ display:flex; align-items:center; gap:16px; }
  .weather-icon{ font-size: 40px; line-height:1; }
  .weather-temp{
    font-family: "SF Mono", "IBM Plex Mono", Consolas, monospace;
    font-size: 34px; font-weight:600; color: var(--teal); line-height:1;
  }
  .weather-desc{ font-size: 13px; color: var(--muted); margin-top:2px; }
  .weather-meta{
    display:flex; gap:16px; margin-top:14px; padding-top:12px;
    border-top: 1px solid var(--line); font-size: 12px; color: var(--muted);
  }
  .weather-meta b{ color: var(--ink); font-family: "SF Mono","IBM Plex Mono",monospace; }

  /* --- Currency --- */
  .fx-row{
    display:flex; align-items:center; justify-content:space-between;
    padding: 9px 2px; border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .fx-row:last-child{ border-bottom:none; }
  .fx-pair{ font-weight:600; color: var(--ink); }
  .fx-value{ display:flex; align-items:center; gap:6px; }
  .fx-rate{
    font-family: "SF Mono","IBM Plex Mono",Consolas,monospace; font-size: 14px;
    color: var(--ink);
  }
  .fx-arrow-up{ color: var(--teal); }
  .fx-arrow-down{ color: var(--rust); }
  .fx-arrow-flat{ color: var(--muted); }
  .fx-updated{ font-size: 11px; color: var(--muted); margin-top: 10px; }

  .status-note{
    font-size: 12px; color: var(--muted); font-style: italic; margin-top: 8px;
  }
  .spinner{
    width:16px; height:16px; border:2px solid var(--line); border-top-color: var(--brass);
    border-radius:50%; animation: spin 0.8s linear infinite; display:inline-block;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
</style>

<script>
(function(){
  const SUPABASE_PROXY_URL = "https://ezwzjwzgthfomnkyumyo.supabase.co/functions/v1/dashboard-proxy";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_q2nm3yFL_AMwfqLdjT0ZTQ__VnlWsZN";

  const root = document.getElementById('app-root');

  const dateStr = new Date().toLocaleDateString('pl-PL', { weekday:'long', day:'numeric', month:'long' });

  root.innerHTML = `
    <div class="wrap">
      <div class="top">
        <h1>Biurko Michała</h1>
        <div class="date">${dateStr}</div>
      </div>
      <div class="grid">
        <div class="panel" id="tasks-panel">
          <h2>Zadania <span class="task-count" id="task-count"></span></h2>
          <div class="task-input-row">
            <input id="task-input" type="text" placeholder="Dodaj zadanie i wciśnij Enter..." />
            <input id="task-category-input" class="task-category-select" list="category-options" type="text" placeholder="Kategoria" value="Ogólne" />
            <datalist id="category-options"></datalist>
            <button id="task-add-btn">Dodaj</button>
          </div>
          <ul class="task-list" id="task-list"></ul>
        </div>
        <div class="side">
          <div class="panel" id="weather-panel">
            <h2>Pogoda</h2>
            <div id="weather-body"><span class="spinner"></span></div>
          </div>
          <div class="panel" id="fx-panel">
            <h2>Kursy walut</h2>
            <div id="fx-body"><span class="spinner"></span></div>
          </div>
        </div>
      </div>
    </div>
  `;

  /* ---------------- TASKS ---------------- */
  const TASKS_KEY = 'tasks';
  let tasks = [];

  async function loadTasks(){
    try{
      const raw = localStorage.getItem(TASKS_KEY);
      tasks = raw ? JSON.parse(raw) : [];
    }catch(e){
      tasks = [];
    }
    renderTasks();
  }

  async function saveTasks(){
    try{
      localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
    }catch(e){
      console.error('Nie udało się zapisać zadań', e);
    }
  }

  function renderTasks(){
    const list = document.getElementById('task-list');
    const count = document.getElementById('task-count');
    const active = tasks.filter(t => !t.done).length;
    count.textContent = tasks.length ? `${active}/${tasks.length}` : '';

    // odśwież podpowiedzi kategorii
    const categoryOptions = document.getElementById('category-options');
    const uniqueCats = [...new Set(tasks.map(t => t.category || 'Ogólne'))];
    categoryOptions.innerHTML = uniqueCats.map(c => `<option value="${escapeHtml(c)}"></option>`).join('');

    if(!tasks.length){
      list.innerHTML = '<div class="task-empty">Brak zadań — dodaj pierwsze powyżej.</div>';
      return;
    }

    // grupowanie po kategorii, zachowując kolejność pierwszego pojawienia się
    const groups = new Map();
    tasks.forEach(t => {
      const cat = t.category || 'Ogólne';
      if(!groups.has(cat)) groups.set(cat, []);
      groups.get(cat).push(t);
    });

    list.innerHTML = [...groups.entries()].map(([cat, catTasks]) => {
      const sorted = [...catTasks].sort((a,b) => (a.done === b.done) ? 0 : (a.done ? 1 : -1));
      const activeInCat = catTasks.filter(t => !t.done).length;
      return `
        <details class="category-group" open>
          <summary>
            <span class="category-arrow">▶</span>
            <span>${escapeHtml(cat)}</span>
            <span class="category-count">${activeInCat}/${catTasks.length}</span>
          </summary>
          <div class="category-body">
            <ul class="task-list" style="margin:0; padding:0;">
              ${sorted.map(t => `
                <li class="task-item ${t.done ? 'done' : ''}" data-id="${t.id}" style="position:relative;">
                  <div class="task-check ${t.done ? 'done' : ''}" data-action="toggle" data-id="${t.id}">${t.done ? '✓' : ''}</div>
                  <div class="task-text">${escapeHtml(t.text)}</div>
                  <button class="task-del" data-action="delete" data-id="${t.id}" title="Usuń">✕</button>
                  <div class="task-stamp" data-stamp="${t.id}">GOTOWE</div>
                </li>
              `).join('')}
            </ul>
          </div>
        </details>
      `;
    }).join('');

    list.querySelectorAll('[data-action="toggle"]').forEach(el => {
      el.addEventListener('click', () => toggleTask(el.dataset.id));
    });
    list.querySelectorAll('[data-action="delete"]').forEach(el => {
      el.addEventListener('click', () => deleteTask(el.dataset.id));
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function addTask(){
    const input = document.getElementById('task-input');
    const catInput = document.getElementById('task-category-input');
    const text = input.value.trim();
    if(!text) return;
    const category = catInput.value.trim() || 'Ogólne';
    tasks.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), text, done:false, category, createdAt: Date.now() });
    input.value = '';
    renderTasks();
    saveTasks();
  }

  function toggleTask(id){
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    t.done = !t.done;
    if(t.done){
      const stamp = document.querySelector(`[data-stamp="${id}"]`);
      if(stamp){
        stamp.style.animation = 'none';
        void stamp.offsetWidth;
        stamp.style.animation = 'stampIn 0.5s ease-out forwards';
      }
      setTimeout(() => { renderTasks(); saveTasks(); }, 480);
    } else {
      renderTasks();
      saveTasks();
    }
  }

  function deleteTask(id){
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
    saveTasks();
  }

  document.getElementById('task-add-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => {
    if(e.key === 'Enter') addTask();
  });

  loadTasks();

  /* ---------------- WEATHER (Turnhout, BE) ---------------- */
  const WEATHER_CODES = {
    0:['☀️','Bezchmurnie'],1:['🌤️','Prawie bezchmurnie'],2:['⛅','Częściowe zachmurzenie'],
    3:['☁️','Pochmurno'],45:['🌫️','Mgła'],48:['🌫️','Mgła z szadzią'],
    51:['🌦️','Lekka mżawka'],53:['🌦️','Mżawka'],55:['🌧️','Silna mżawka'],
    61:['🌧️','Lekki deszcz'],63:['🌧️','Deszcz'],65:['🌧️','Silny deszcz'],
    71:['🌨️','Lekki śnieg'],73:['🌨️','Śnieg'],75:['❄️','Silny śnieg'],
    80:['🌦️','Przelotne opady'],81:['🌧️','Przelotny deszcz'],82:['⛈️','Ulewa'],
    95:['⛈️','Burza'],96:['⛈️','Burza z gradem'],99:['⛈️','Silna burza']
  };

  async function loadWeather(){
    const body = document.getElementById('weather-body');
    const directUrl = 'https://api.open-meteo.com/v1/forecast?latitude=51.3222&longitude=4.9447&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FBrussels&forecast_days=7';
    const fetchUrl = SUPABASE_PROXY_URL ? `${SUPABASE_PROXY_URL}?type=weather` : directUrl;
    const fetchOpts = SUPABASE_PROXY_URL ? { headers: {
      'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
      'apikey': SUPABASE_PUBLISHABLE_KEY
    }} : {};
    try{
      const res = await fetch(fetchUrl, fetchOpts);
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const daily = data.daily;
      const dayNames = ['Nd','Pon','Wt','Śr','Czw','Pt','Sob'];

      const rows = daily.time.map((dateStr, i) => {
        const d = new Date(dateStr);
        const label = i === 0 ? 'Dziś' : dayNames[d.getDay()];
        const [icon] = WEATHER_CODES[daily.weathercode[i]] || ['🌡️'];
        const max = Math.round(daily.temperature_2m_max[i]);
        const min = Math.round(daily.temperature_2m_min[i]);
        const precip = Math.round(daily.precipitation_probability_max[i]);
        return `
          <div class="weather-day-row">
            <div class="weather-day-name">${label}</div>
            <div class="weather-day-icon">${icon}</div>
            <div class="weather-day-precip">💧${precip}%</div>
            <div class="weather-day-temps">
              <span class="weather-day-max">${max}°</span>
              <span class="weather-day-min">${min}°</span>
            </div>
          </div>
        `;
      }).join('');

      body.innerHTML = `
        <div class="weather-days">${rows}</div>
        <div class="weather-place">Turnhout, Belgia · dzień / noc · dane: Open-Meteo</div>
      `;
    }catch(e){
      body.innerHTML = `
        <div class="status-note">
          ${SUPABASE_PROXY_URL ? 'Nie udało się połączyć z Twoim proxy Supabase. Sprawdź, czy funkcja jest wdrożona i URL jest poprawny.' : 'Nie udało się pobrać danych na żywo (sandbox blokuje zapytania). Ustaw SUPABASE_PROXY_URL na górze skryptu.'}
        </div>
      `;
    }
  }
  loadWeather();

  /* ---------------- CURRENCY ---------------- */
  const FX_PREV_KEY = 'fx_prev_rates';

  function arrowFor(curr, prev){
    if(prev == null) return '<span class="fx-arrow-flat">–</span>';
    if(curr > prev) return '<span class="fx-arrow-up">▲</span>';
    if(curr < prev) return '<span class="fx-arrow-down">▼</span>';
    return '<span class="fx-arrow-flat">–</span>';
  }

  async function loadFx(){
    const body = document.getElementById('fx-body');
    const directUrl = 'https://api.frankfurter.app/latest?from=EUR&to=USD,PLN';
    const fetchUrl = SUPABASE_PROXY_URL ? `${SUPABASE_PROXY_URL}?type=fx` : directUrl;
    const fetchOpts = SUPABASE_PROXY_URL ? { headers: {
      'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
      'apikey': SUPABASE_PUBLISHABLE_KEY
    }} : {};
    try{
      const res = await fetch(fetchUrl, fetchOpts);
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const eurUsd = data.rates.USD;
      const eurPln = data.rates.PLN;
      const usdPln = eurPln / eurUsd;
      const btcUsd = data.bitcoin ? data.bitcoin.usd : null;
      const btcPln = data.bitcoin ? data.bitcoin.pln : null;

      let prev = {};
      try{
        const raw = localStorage.getItem(FX_PREV_KEY);
        prev = raw ? JSON.parse(raw) : {};
      }catch(e){ prev = {}; }

      body.innerHTML = `
        <div class="fx-row">
          <div class="fx-pair">EUR → PLN</div>
          <div class="fx-value">${arrowFor(eurPln, prev.eurPln)}<span class="fx-rate">${eurPln.toFixed(4)}</span></div>
        </div>
        <div class="fx-row">
          <div class="fx-pair">USD → PLN</div>
          <div class="fx-value">${arrowFor(usdPln, prev.usdPln)}<span class="fx-rate">${usdPln.toFixed(4)}</span></div>
        </div>
        ${btcPln != null ? `
        <div class="fx-row">
          <div class="fx-pair">₿ Bitcoin</div>
          <div class="fx-value">${arrowFor(btcPln, prev.btcPln)}<span class="fx-rate">${Math.round(btcPln).toLocaleString('pl-PL')} PLN</span></div>
        </div>
        ` : ''}
        <div class="fx-updated">Zaktualizowano: ${data.date} · dane: Frankfurter API, CoinGecko</div>
      `;

      try{
        localStorage.setItem(FX_PREV_KEY, JSON.stringify({ eurPln, eurUsd, usdPln, btcPln, btcUsd }));
      }catch(e){}
    }catch(e){
      body.innerHTML = `
        <div class="status-note">
          ${SUPABASE_PROXY_URL ? 'Nie udało się połączyć z Twoim proxy Supabase. Sprawdź, czy funkcja jest wdrożona i URL jest poprawny.' : 'Nie udało się pobrać kursów na żywo (sandbox blokuje zapytania). Ustaw SUPABASE_PROXY_URL na górze skryptu.'}
        </div>
      `;
    }
  }
  loadFx();
})();
</script>
